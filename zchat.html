<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z Chat | Modern Messaging</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #000000;
      color: #e0e0e0;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      background: #0a0a0a;
    }

    /* ============ SIDEBAR ============ */
    .sidebar {
      width: 300px;
      background: #121212;
      border-right: 1px solid rgba(100, 200, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(100, 200, 255, 0.08);
    }

    .app-title {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #64c8ff, #b366ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.2rem;
      letter-spacing: 0.8px;
    }

    .search-bar {
      width: 100%;
      padding: 0.8rem;
      background: rgba(100, 200, 255, 0.08);
      border: 1px solid rgba(100, 200, 255, 0.15);
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-bar:focus {
      background: rgba(100, 200, 255, 0.12);
      border-color: rgba(100, 200, 255, 0.35);
      box-shadow: 0 0 12px rgba(100, 200, 255, 0.1);
    }

    .sidebar-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem 0;
      border-bottom: 1px solid rgba(100, 200, 255, 0.08);
    }

    .tab-btn {
      padding: 0.6rem 1rem;
      background: transparent;
      border: 1px solid rgba(100, 200, 255, 0.15);
      color: #a0a0a0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: rgba(100, 200, 255, 0.15);
      color: #64c8ff;
      border-color: rgba(100, 200, 255, 0.3);
      box-shadow: 0 0 12px rgba(100, 200, 255, 0.1);
    }

    .tab-btn:hover:not(.active) {
      border-color: rgba(100, 200, 255, 0.25);
      color: #d0d0d0;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 0;
    }

    .chat-item {
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      transition: all 0.25s ease;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .chat-item:hover {
      background: rgba(100, 200, 255, 0.08);
    }

    .chat-item.active {
      background: rgba(100, 200, 255, 0.12);
      border-left-color: #64c8ff;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #64c8ff, #b366ff);
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: #e0e0e0;
    }

    .chat-preview {
      font-size: 0.8rem;
      color: #808080;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
      animation: pulse 2s infinite;
    }

    .status-indicator.offline {
      background: #666;
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ============ SCROLLBAR ============ */
    .chat-list::-webkit-scrollbar {
      width: 6px;
    }

    .chat-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: rgba(100, 200, 255, 0.2);
      border-radius: 3px;
    }

    .chat-list::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 200, 255, 0.35);
    }

    /* ============ MAIN CHAT AREA ============ */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }

    .chat-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(100, 200, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .header-user {
      font-size: 1rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .header-status {
      font-size: 0.8rem;
      color: #808080;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .header-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 4px rgba(74, 222, 128, 0.5);
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 65%;
      padding: 0.8rem 1.1rem;
      border-radius: 16px;
      word-wrap: break-word;
      transition: all 0.25s ease;
    }

    .message.received .message-bubble {
      background: rgba(100, 200, 255, 0.1);
      border: 1px solid rgba(100, 200, 255, 0.15);
      color: #e0e0e0;
    }

    .message.received .message-bubble:hover {
      background: rgba(100, 200, 255, 0.15);
      border-color: rgba(100, 200, 255, 0.3);
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.25), rgba(179, 102, 255, 0.15));
      border: 1px solid rgba(100, 200, 255, 0.3);
      color: #e0e0e0;
      box-shadow: 0 0 12px rgba(100, 200, 255, 0.15);
    }

    .message.sent .message-bubble:hover {
      box-shadow: 0 0 20px rgba(100, 200, 255, 0.25);
    }

    .message-time {
      font-size: 0.7rem;
      color: #606060;
      margin-top: 0.3rem;
      text-align: right;
    }

    .message.received .message-time {
      text-align: left;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #808080;
      font-size: 0.85rem;
      padding: 0.8rem 1.1rem;
    }

    .dot-animate {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #64c8ff;
      animation: bounce 1.4s infinite;
    }

    .dot-animate:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot-animate:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ============ MESSAGE INPUT ============ */
    .input-area {
      padding: 1.2rem;
      border-top: 1px solid rgba(100, 200, 255, 0.1);
      display: flex;
      gap: 0.8rem;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .message-input {
      flex: 1;
      padding: 0.9rem 1.1rem;
      background: rgba(100, 200, 255, 0.08);
      border: 1px solid rgba(100, 200, 255, 0.15);
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      max-height: 100px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .message-input:focus {
      background: rgba(100, 200, 255, 0.12);
      border-color: rgba(100, 200, 255, 0.3);
      box-shadow: 0 0 12px rgba(100, 200, 255, 0.1);
    }

    .message-input::placeholder {
      color: #606060;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(100, 200, 255, 0.2);
      background: rgba(100, 200, 255, 0.08);
      border-radius: 10px;
      color: #64c8ff;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      transition: all 0.25s ease;
      outline: none;
    }

    .icon-btn:hover {
      background: rgba(100, 200, 255, 0.15);
      border-color: rgba(100, 200, 255, 0.35);
      box-shadow: 0 0 10px rgba(100, 200, 255, 0.15);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: linear-gradient(135deg, #64c8ff, #b366ff);
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
      outline: none;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(100, 200, 255, 0.5);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 10;
        width: 250px;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .container {
        position: relative;
      }

      .message-bubble {
        max-width: 85%;
      }

      .messages-area {
        padding: 1rem;
      }

      .input-area {
        padding: 1rem;
      }
    }

    /* ============ EMPTY STATE ============ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #606060;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="app-title">Z Chat</div>
        <input type="text" class="search-bar" id="searchBar" placeholder="Search chats...">
      </div>

      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="chats">Chats</button>
        <button class="tab-btn" data-tab="groups">Groups</button>
        <button class="tab-btn" data-tab="profile">Profile</button>
      </div>

      <div class="chat-list" id="chatList">
        <!-- Chat items will be generated here -->
      </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="chat-container">
      <!-- HEADER -->
      <div class="chat-header">
        <div class="header-info">
          <div class="chat-avatar" id="headerAvatar">A</div>
          <div>
            <div class="header-user" id="headerName">Select a chat</div>
            <div class="header-status">
              <span class="dot"></span>
              <span id="headerStatus">offline</span>
            </div>
          </div>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages-area" id="messagesArea">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <p>Select a chat to start messaging</p>
        </div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-group">
          <button class="icon-btn" id="emojiBtn" title="Emoji">😊</button>
          <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" title="Send">➤</button>
      </div>
    </div>
  </div>

  <script>
    // Sample chat data
    const chats = [
      { id: 1, name: 'Sarah', avatar: 'S', online: true, status: 'online', messages: [
        { text: 'Hey! How are you?', sent: false, time: '10:30 AM' },
        { text: 'I\'m doing great, thanks!', sent: true, time: '10:32 AM' },
        { text: 'Want to hang out later?', sent: false, time: '10:33 AM' }
      ]},
      { id: 2, name: 'Alex', avatar: 'A', online: false, status: 'offline', messages: [
        { text: 'Did you finish the project?', sent: true, time: '9:15 AM' }
      ]},
      { id: 3, name: 'Emma', avatar: 'E', online: true, status: 'online', messages: [
        { text: 'Check out this meme 😂', sent: false, time: '11:00 AM' },
        { text: 'haha good one!', sent: true, time: '11:02 AM' }
      ]},
      { id: 4, name: 'Jordan', avatar: 'J', online: true, status: 'online', messages: [
        { text: 'Team meeting at 3?', sent: false, time: '12:00 PM' }
      ]},
      { id: 5, name: 'Casey', avatar: 'C', online: false, status: 'offline', messages: [
        { text: 'See you tomorrow!', sent: false, time: '8:00 PM' }
      ]}
    ];

    let currentChatId = null;

    // Render chat list
    function renderChatList() {
      const chatList = document.getElementById('chatList');
      chatList.innerHTML = '';
      chats.forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
        div.onclick = () => selectChat(chat.id);
        const lastMsg = chat.messages[chat.messages.length - 1];
        div.innerHTML = `
          <div class="chat-avatar">${chat.avatar}</div>
          <div class="chat-info">
            <div class="chat-name">${chat.name}</div>
            <div class="chat-preview">${lastMsg ? lastMsg.text : 'No messages'}</div>
          </div>
          <div class="status-indicator ${chat.online ? '' : 'offline'}"></div>
        `;
        chatList.appendChild(div);
      });
    }

    // Select chat
    function selectChat(chatId) {
      currentChatId = chatId;
      const chat = chats.find(c => c.id === chatId);
      renderChatList();
      renderMessages(chat);
      updateHeader(chat);
      document.getElementById('messageInput').focus();
    }

    // Update header
    function updateHeader(chat) {
      document.getElementById('headerAvatar').textContent = chat.avatar;
      document.getElementById('headerName').textContent = chat.name;
      document.getElementById('headerStatus').textContent = chat.status;
    }

    // Render messages
    function renderMessages(chat) {
      const area = document.getElementById('messagesArea');
      area.innerHTML = '';
      chat.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.sent ? 'sent' : 'received'}`;
        div.innerHTML = `
          <div>
            <div class="message-bubble">${msg.text}</div>
            <div class="message-time">${msg.time}</div>
          </div>
        `;
        area.appendChild(div);
      });
      area.scrollTop = area.scrollHeight;
    }

    // Send message
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatId) return;

      const chat = chats.find(c => c.id === currentChatId);
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      chat.messages.push({ text, sent: true, time });
      
      input.value = '';
      renderMessages(chat);
      
      // Simulate reply
      setTimeout(() => {
        chat.messages.push({ text: 'Got it! 👍', sent: false, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        renderMessages(chat);
        renderChatList();
      }, 1000);
    }

    // Event listeners
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('emojiBtn').addEventListener('click', () => {
      const input = document.getElementById('messageInput');
      input.value += '😊 ';
      input.focus();
    });

    // Initial render
    renderChatList();
  </script>
</body>
</html>
