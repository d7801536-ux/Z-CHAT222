<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Z-CHAT | Tactical Cyber-Noir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&family=Inconsolata:wght@200;300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020202;
      --bg-deep: #050608;
      --n: #7aff2e;
      --n-soft: rgba(122, 255, 46, 0.1);
      --n-glow: rgba(122, 255, 46, 0.25);
      --t: #d4f4ff;
      --t-sub: #a8d4ff;
      --glass: rgba(8, 12, 18, 0.48);
      --glass-light: rgba(15, 20, 28, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; background: var(--bg); }
    body {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--t);
      background: linear-gradient(135deg, #030507 0%, #020202 50%, #050405 100%);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 35% 25%, rgba(5, 200, 100, 0.18), transparent 50%),
        radial-gradient(ellipse 600px 500px at 75% 75%, rgba(100, 200, 255, 0.12), transparent 45%);
      pointer-events: none;
      z-index: 1;
      filter: blur(80px);
    }
    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      overflow: hidden;
    }
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      background-image: linear-gradient(rgba(122, 255, 46, 0.04) 1.5px, transparent 1.5px);
      background-size: 100% 4px;
      mix-blend-mode: overlay;
      pointer-events: none;
    }
    .card {
      width: min(540px, calc(100vw - 2rem));
      position: relative;
      background: linear-gradient(145deg, var(--glass-light), var(--glass));
      border: 1.2px solid rgba(122, 255, 46, 0.28);
      border-radius: 28px;
      padding: 2.4rem 2rem;
      box-shadow:
        0 0 60px rgba(122, 255, 46, 0.18),
        0 0 120px rgba(50, 200, 100, 0.08),
        inset 0 0 3px rgba(122, 255, 46, 0.15);
      backdrop-filter: blur(14px);
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(122, 255, 46, 0.15), rgba(100, 255, 80, 0.08));
      filter: blur(24px);
      z-index: -1;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-align: center;
      color: #b8e8ff;
      text-shadow:
        0 0 3px rgba(10, 20, 40, 0.6),
        0 0 18px rgba(122, 255, 46, 0.55),
        0 0 40px rgba(80, 200, 255, 0.28);
      background: linear-gradient(120deg, #daffff 0%, #b0ff70 35%, #70ff88 60%, #a0ffb0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 6px rgba(122, 255, 46, 0.4));
      margin-bottom: 0.6rem;
    }
    .tagline {
      font-family: 'Inconsolata', monospace;
      font-size: 0.92rem;
      letter-spacing: 0.28em;
      text-align: center;
      color: rgba(168, 212, 255, 0.9);
      margin-bottom: 1.8rem;
      text-shadow: 0 0 12px rgba(122, 255, 46, 0.15);
      font-weight: 300;
    }
    .form {
      display: grid;
      gap: 1.1rem;
    }
    .input-group {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: var(--glass-light);
      border: 1px solid rgba(122, 255, 46, 0.32);
      box-shadow: inset 0 0 14px rgba(122, 255, 46, 0.12);
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }
    .input-group:focus-within {
      border-color: rgba(122, 255, 46, 0.6);
      box-shadow:
        inset 0 0 14px rgba(122, 255, 46, 0.15),
        0 0 20px rgba(122, 255, 46, 0.25);
    }
    .input-group input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--t);
      padding: 1rem 1.2rem 0.9rem;
      font-size: 0.98rem;
      font-family: 'Inconsolata', monospace;
      outline: none;
    }
    .input-group label {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(168, 212, 255, 0.75);
      font-size: 0.88rem;
      pointer-events: none;
      transition: all 0.28s cubic-bezier(0.23, 1, 0.82, 0.74);
      font-weight: 400;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      transform: translateY(-135%);
      font-size: 0.72rem;
      color: #7aff2e;
    }
    .actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
      align-items: center;
    }
    .btn {
      border: 0;
      border-radius: 99px;
      padding: 1rem 0;
      font-family: 'Inconsolata', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      cursor: pointer;
      outline: none;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 700;
    }
    .btn-upgrade {
      flex: 1;
      border: 1.5px solid rgba(122, 255, 46, 0.5);
      background: var(--glass-light);
      color: #a8ff7a;
      box-shadow: 0 0 18px rgba(122, 255, 46, 0.2), inset 0 0 1px rgba(122, 255, 46, 0.3);
    }
    .btn-upgrade:hover {
      background: rgba(122, 255, 46, 0.12);
      border-color: rgba(122, 255, 46, 0.8);
      box-shadow: 0 0 30px rgba(122, 255, 46, 0.35), inset 0 0 2px rgba(122, 255, 46, 0.5);
      transform: translateY(-2px);
    }
    .btn-access {
      flex: 1.2;
      background: linear-gradient(135deg, #c2ff40 0%, #85e020 45%, #5aa300 100%);
      color: #041500;
      box-shadow: 0 8px 24px rgba(122, 255, 46, 0.38), inset 0 0 3px rgba(255, 255, 255, 0.2);
    }
    .btn-access::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      opacity: 0;
    }
    .btn-access:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(122, 255, 46, 0.5), 0 0 40px rgba(122, 255, 46, 0.3);
      animation: pulse-access 2s ease-in-out infinite;
    }
    @keyframes pulse-access {
      0%, 100% { box-shadow: 0 14px 36px rgba(122, 255, 46, 0.5), 0 0 40px rgba(122, 255, 46, 0.3); }
      50% { box-shadow: 0 10px 28px rgba(122, 255, 46, 0.65), 0 0 60px rgba(122, 255, 46, 0.45); }
    }
    .addon {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.4rem;
      padding: 1rem;
      border: 1px solid rgba(122, 255, 46, 0.3);
      border-radius: 20px;
      background: var(--glass-light);
      box-shadow: 0 0 20px rgba(122, 255, 46, 0.12);
      backdrop-filter: blur(10px);
      animation: slideIn 0.6s ease-out;
    }
    @keyframes slideIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .addon-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(122, 255, 46, 0.9), rgba(100, 220, 50, 0.7));
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      box-shadow: 0 0 20px rgba(122, 255, 46, 0.35);
      flex-shrink: 0;
    }
    .addon-text {
      flex: 1;
      min-width: 0;
    }
    .addon-title {
      font-family: 'Inconsolata', monospace;
      font-weight: 700;
      color: #d4f4ff;
      font-size: 0.86rem;
      letter-spacing: 0.16em;
      margin-bottom: 0.25rem;
    }
    .addon-desc {
      font-size: 0.75rem;
      color: rgba(168, 212, 255, 0.75);
      line-height: 1.4;
    }
    .btn-addon {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 99px;
      padding: 0.68rem 1rem;
      font-family: 'Inconsolata', monospace;
      font-size: 0.73rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #041500;
      background: linear-gradient(145deg, #a4ff5a, #7ada20);
      box-shadow: 0 0 16px rgba(122, 255, 46, 0.4);
      transition: all 0.3s ease;
      font-weight: 600;
      flex-shrink: 0;
    }
    .btn-addon:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 24px rgba(122, 255, 46, 0.5);
    }
    .status-bar {
      position: fixed;
      bottom: 1.2rem;
      left: 1.2rem;
      right: 1.2rem;
      font-family: 'Inconsolata', monospace;
      font-size: 0.65rem;
      color: rgba(122, 255, 46, 0.6);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      letter-spacing: 0.13em;
      z-index: 4;
      text-transform: uppercase;
    }
    .status-item {
      opacity: 0.7;
      text-shadow: 0 0 8px rgba(122, 255, 46, 0.1);
    }
    @media (max-width: 768px) {
      .card { padding: 1.6rem; }
      .logo { font-size: 2.2rem; letter-spacing: 0.2em; }
      .tagline { font-size: 0.78rem; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
      .status-bar { display: none; }
      .addon { gap: 0.7rem; padding: 0.8rem; }
      .addon-icon { width: 42px; height: 42px; font-size: 1rem; }
      .addon-title { font-size: 0.78rem; }
      .addon-desc { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="container">
    <div class="card">
      <div class="logo">Z-CHAT</div>
      <div class="tagline">ULTRA FAST // PROTOCOL 4.0</div>
      <form class="form" autocomplete="off">
        <div class="input-group">
          <input id="email" type="email" required autocomplete="off" placeholder=" ">
          <label for="email">Email Address</label>
        </div>
        <div class="input-group">
          <input id="password" type="password" required autocomplete="new-password" placeholder=" ">
          <label for="password">Password</label>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-upgrade" id="upgrade-btn">UPGRADE</button>
          <button type="submit" class="btn btn-access" id="login-btn">ACCESS SYSTEM</button>
        </div>
      </form>
      <div class="addon">
        <div class="addon-icon">⚡</div>
        <div class="addon-text">
          <div class="addon-title">ENCRYPTION PLUS</div>
          <div class="addon-desc">Quantum-resistant tunnel + 4x stealth mode</div>
        </div>
        <button type="button" class="btn-addon" id="addon-btn">ADDON</button>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-item">🔐 ENCRYPTED • LIVE NODE • PROTOCOL V4</div>
    <div class="status-item">LATENCY 0.7ms • STATUS ONLINE • SECURE</div>
  </div>
  <script src="app.js.js"></script>
</body>
</html>
